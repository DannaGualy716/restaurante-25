<body>

      <a class="navbar-brand text-dark" href="index.html">Sabores del Campo</a>

          <li class="nav-item"><a class="nav-link text-dark" href="index.html">Inicio</a></li>

  <!-- CONTENIDO -->
  <div class="container mt-3">
    <div class=" shadow p-2 rounded">

      <h2 class="text-center mb-2">Reserva tu mesa</h2>
      <p class="text-center text-muted mb-2">
        Completa el formulario y te confirmaremos tu reserva.
      </p>

      <form>
        <div class="mb-3">
          <label class="form-label" id="nombre">Nombre completo</label>
          <input type="text" class="form-control" placeholder="Ej: Juan Perez">
        </div>

        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" class="form-control" placeholder="correo@ejemplo.com">
        </div>

        <div class="mb-3">
          <label class="form-label">Fecha de la reserva</label>
          <input type="date" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Hora</label>
          <input type="time" class="form-control">
        </div>

        <div class="mb-3">
          <label class="form-label">Número de personas</label>
          <select class="form-select">
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5+</option>
          </select>
        </div>

        <div class="d-grid">
          <button 
            type="button" class="btn btn-danger btn-lg" onclick="verificar()">
            Reservar ahora
        </button>
        </div>
      </form>

    </div>
  </div>
</body>

   

   <footer class="bg-info text-center mt-5">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>



    <script>
        function verificar() {

    let nombre = document.querySelector('input[type="text"]').value;

    let campos = document.querySelectorAll('.form-control');

    for (let i = 0; i < campos.length; i++) {
      if (campos[i].value === "") {

        Swal.fire({
                icon: "error",
                title: "¡Oops...!",
                text: "Por favor complete todos los campos!"
        });
        return;
      }
    }

    let respuesta = confirm("¿Desea confirmar la reserva?");

    if (respuesta) {

      Swal.fire({
                title: "Hecho",
                text: "Tu reserva ha sido registrada.",
                icon: "success",
                draggable: true
      });
    } else {

      Swal.fire({
                title: "Cancelada",
                text: "Reserva cancelada. Puedes intentarlo nuevamente.",
                icon: "success",
                draggable: true
            });
    }
  }
    
</script>
    </script>
